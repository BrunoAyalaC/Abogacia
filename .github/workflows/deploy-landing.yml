name: Deploy Lex.ia Landing → GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.js'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: ⏱️ Start Build
        run: echo "🚀 BUILD START: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci && echo "✅ Dependencies ready: $(date -u +'%H:%M:%S UTC')"

      - name: Build
        run: npm run build && echo "✅ Build complete: $(date -u +'%H:%M:%S UTC')"

      - name: Remove old docs folder
        run: |
          rm -rf docs
          echo "✅ Old docs removed"

      - name: Move dist to docs
        run: |
          mv dist docs
          echo "✅ dist → docs"

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/
          git commit -m "ci: deploy landing page [skip ci]" || echo "No changes to commit"
          git push origin main
          echo "✅ Deployed: $(date -u +'%H:%M:%S UTC')"
